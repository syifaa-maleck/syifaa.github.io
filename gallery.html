<!DOCTYPE html>
<html>
<head>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
	body {
		margin: 0;
		background-image: url('background1.png');
		background-size: cover;
		background-position: center;
		background-attachment: fixed;
		font-family: 'Poppins', sans-serif;
		color: white;
}

	.overlay {
		min-height: 100vh;
		background: rgba(10, 15, 30, 0.7);
}

	nav {
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 25px 70px;
		background: rgba(0, 0, 0, 0.20);
		backdrop-filter: blur(6px);
}

	nav ul {
		list-style: none;
		display: flex;
		gap: 40px;
		margin: 0;
		padding: 0;
}

	nav ul li a {
		text-decoration: none;
		color: #F2F4FF;
		font-size: 15px;
		transition: 0.3s;
}

	nav ul li a:hover {
		color: #B9C8FF;
		text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
}

	.gallery-header {
		padding: 80px 90px 40px;
		text-align: center;
}

	.title-serif {
		font-family: 'Cormorant Garamond', serif;
		font-size: 50px;
		color: #ffffff;
		text-shadow: 0 0 15px rgba(255,255,255,0.4);
		margin-bottom: 10px;
}

	.gallery-container {
		display:grid;
		grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
		gap:25px;
		padding: 0 90px 80px;

}

	.gallery-item {
		position: relative;
		background: rgba(20,25,40,0.5);
		backdrop-filter: blur(10px);
		border-radius: 20px;
		overflow: hidden;
		border: 1px solid rgba(255,255,255,0.1);
		transition: transform 0.4s ease;
		cursor: pointer;

}

	.gallery-item:hover {
		transform: translateY(-10px);
		box-shadow: 0 15px 30px rgba(0,0,0,0.4);

}

	.gallery-item img {
		width:100%;
		height:250px;
		object-fit: cover;
		display: block;
		transition: transform 0.5s ease;

}

	.gallery-item:hover img {
		transform: scale(1.1);

}

	.img-overlay {
		position:absolute;
		bottom:0;
		left:0;
		right:0;
		background: linear-gradient(transparent, rgba(10,15,30,0.9));
		padding:20px;
		opacity:0;
		transition:0.4s;
}

        .gallery-item:hover .img-overlay {
            	opacity: 1;
}

        .img-overlay span {
            	font-size: 14px;
            	color: #B9C8FF;
            	letter-spacing: 1px;
            	text-transform: uppercase;

}

	.footer {
		text-align: center;
		padding: 30px;
		color: white;
		font-size: 14px;
	}
</style>
</head>

<body>
	<div class="overlay">
		<nav>
			<ul>
				<li><a href="index.html">Home</a></li>
				<li><a href="about.html">About Me</a></li>
				<li><a href="family.html">My Family</a></li>
				<li><a href="education.html">Education</a></li>
				<li><a href="gallery.html">Gallery</a></li>
				<li><a href="contact.html">Contact</a></li>
			</ul>
		</nav>

		<div class="gallery-header">
            		<div class="title-serif">✦ Visual Journal ✦</div>
            		<p style="color: #B9C8FF; letter-spacing: 3px;">MEMORIES</p>
        	</div>

        	<div class="gallery-container">
		<div class="gallery-item">
                	<img src="family1.jpg" alt="Memory 1">
                <div class="img-overlay">
                    <span><strong>Raya with Family</strong></span>
                </div>
            </div>

		<div class="gallery-item">
                	<img src="diploma1.jpg" alt="Memory 2">
                <div class="img-overlay">
                    <span><strong>Diploma's Event</strong></span>
                </div>
            </div>

		<div class="gallery-item">
                	<img src="diploma2.jpg" alt="Memory 2">
                <div class="img-overlay">
                    <span><strong>Diploma's Convocation</strong></span>
                </div>
            </div>
	</div>

		<div class="footer">
			© 2026 NURUL SYIFAA' | IML470 INDIVIDUAL PROJECT	
		</div>
	</div>

	<audio id="syifaaAudio" loop hidden>
		<source src="audioHome.mp3" type="audio/mpeg">
	</audio>

	<script>
		const audio = document.getElementById("syifaaAudio"); 
		function startAudio() {
			audio.play().catch(function(error) {
				console.log("Audio play deferred");
			});
		}
		window.addEventListener('scroll', startAudio, { once: true });
		window.addEventListener('mousemove', startAudio, { once: true });
		window.addEventListener('touchstart', startAudio, { once: true });
		window.addEventListener('click', startAudio, { once: true });
	</script>
</body>
</html>
